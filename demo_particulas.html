<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller Pro — Talleres & Aquiles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #1f2937;
      border-radius: 8px;
      max-width: 100%;
      height: auto;
    }
    .info {
      margin-top: 1rem;
      color: #fff;
      text-align: center;
      font-size: 14px;
    }
    .info p:last-child {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="info">
    <p>Taller Pro</p>
    <p>Click derecho sostenido para destruir partículas · Las palabras cambian automáticamente cada 4 segundos</p>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = 1000;
      canvas.height = 500;

      const words = ['Taller', 'Aquiles'];
      const pixelSteps = 6;
      const drawAsPoints = true;
      let wordIndex = 0;
      let frameCount = 0;
      const particles = [];
      const mouse = { x: 0, y: 0, isPressed: false, isRightClick: false };

      class Particle {
        constructor() {
          this.pos = { x: 0, y: 0 };
          this.vel = { x: 0, y: 0 };
          this.acc = { x: 0, y: 0 };
          this.target = { x: 0, y: 0 };
          this.closeEnoughTarget = 100;
          this.maxSpeed = 1.0;
          this.maxForce = 0.1;
          this.particleSize = 10;
          this.isKilled = false;
          this.startColor = { r: 0, g: 0, b: 0 };
          this.targetColor = { r: 0, g: 0, b: 0 };
          this.colorWeight = 0;
          this.colorBlendRate = 0.01;
        }

        move() {
          let proximityMult = 1;
          const dx = this.pos.x - this.target.x;
          const dy = this.pos.y - this.target.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < this.closeEnoughTarget) {
            proximityMult = distance / this.closeEnoughTarget;
          }

          let towardsX = this.target.x - this.pos.x;
          let towardsY = this.target.y - this.pos.y;
          const magnitude = Math.sqrt(towardsX * towardsX + towardsY * towardsY);
          if (magnitude > 0) {
            towardsX = (towardsX / magnitude) * this.maxSpeed * proximityMult;
            towardsY = (towardsY / magnitude) * this.maxSpeed * proximityMult;
          }

          let steerX = towardsX - this.vel.x;
          let steerY = towardsY - this.vel.y;

          const steerMag = Math.sqrt(steerX * steerX + steerY * steerY);
          if (steerMag > 0) {
            steerX = (steerX / steerMag) * this.maxForce;
            steerY = (steerY / steerMag) * this.maxForce;
          }

          this.acc.x += steerX;
          this.acc.y += steerY;

          this.vel.x += this.acc.x;
          this.vel.y += this.acc.y;
          this.pos.x += this.vel.x;
          this.pos.y += this.vel.y;
          this.acc.x = 0;
          this.acc.y = 0;
        }

        draw() {
          if (this.colorWeight < 1.0) {
            this.colorWeight = Math.min(this.colorWeight + this.colorBlendRate, 1.0);
          }

          const cr = Math.round(this.startColor.r + (this.targetColor.r - this.startColor.r) * this.colorWeight);
          const cg = Math.round(this.startColor.g + (this.targetColor.g - this.startColor.g) * this.colorWeight);
          const cb = Math.round(this.startColor.b + (this.targetColor.b - this.startColor.b) * this.colorWeight);

          ctx.fillStyle = `rgb(${cr}, ${cg}, ${cb})`;

          if (drawAsPoints) {
            ctx.fillRect(this.pos.x, this.pos.y, 2, 2);
          } else {
            ctx.beginPath();
            ctx.arc(this.pos.x, this.pos.y, this.particleSize / 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        kill() {
          if (!this.isKilled) {
            const randomX = Math.random() * 1000;
            const randomY = Math.random() * 500;
            let dirX = randomX - canvas.width / 2;
            let dirY = randomY - canvas.height / 2;
            const mag = Math.sqrt(dirX * dirX + dirY * dirY);
            const scale = (canvas.width + canvas.height) / 2;
            if (mag > 0) {
              dirX = (dirX / mag) * scale;
              dirY = (dirY / mag) * scale;
            }
            this.target.x = canvas.width / 2 + dirX;
            this.target.y = canvas.height / 2 + dirY;

            this.startColor = {
              r: this.startColor.r + (this.targetColor.r - this.startColor.r) * this.colorWeight,
              g: this.startColor.g + (this.targetColor.g - this.startColor.g) * this.colorWeight,
              b: this.startColor.b + (this.targetColor.b - this.startColor.b) * this.colorWeight,
            };
            this.targetColor = { r: 0, g: 0, b: 0 };
            this.colorWeight = 0;
            this.isKilled = true;
          }
        }
      }

      function randomPos(centerX, centerY, mag) {
        const rx = Math.random() * 1000;
        const ry = Math.random() * 500;
        let dx = rx - centerX;
        let dy = ry - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          dx = (dx / dist) * mag;
          dy = (dy / dist) * mag;
        }
        return { x: centerX + dx, y: centerY + dy };
      }

      function nextWord(word) {
        const offscreen = document.createElement('canvas');
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        const offCtx = offscreen.getContext('2d');

        offCtx.fillStyle = '#fff';
        offCtx.font = 'bold 100px Arial';
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        offCtx.fillText(word, canvas.width / 2, canvas.height / 2);

        const imageData = offCtx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;

        const newColor = {
          r: Math.random() * 255,
          g: Math.random() * 255,
          b: Math.random() * 255,
        };

        const coords = [];
        for (let i = 0; i < pixels.length; i += pixelSteps * 4) {
          coords.push(i);
        }

        for (let i = coords.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [coords[i], coords[j]] = [coords[j], coords[i]];
        }

        let pIdx = 0;
        for (const coord of coords) {
          const alpha = pixels[coord + 3];
          if (alpha > 0) {
            const x = (coord / 4) % canvas.width;
            const y = Math.floor((coord / 4) / canvas.width);

            let p;
            if (pIdx < particles.length) {
              p = particles[pIdx];
              p.isKilled = false;
              pIdx++;
            } else {
              p = new Particle();
              const rp = randomPos(canvas.width / 2, canvas.height / 2, (canvas.width + canvas.height) / 2);
              p.pos.x = rp.x;
              p.pos.y = rp.y;
              p.maxSpeed = Math.random() * 6 + 4;
              p.maxForce = p.maxSpeed * 0.05;
              p.particleSize = Math.random() * 6 + 6;
              p.colorBlendRate = Math.random() * 0.0275 + 0.0025;
              particles.push(p);
            }

            p.startColor = {
              r: p.startColor.r + (p.targetColor.r - p.startColor.r) * p.colorWeight,
              g: p.startColor.g + (p.targetColor.g - p.startColor.g) * p.colorWeight,
              b: p.startColor.b + (p.targetColor.b - p.startColor.b) * p.colorWeight,
            };
            p.targetColor = newColor;
            p.colorWeight = 0;
            p.target.x = x;
            p.target.y = y;
          }
        }

        for (let i = pIdx; i < particles.length; i++) {
          particles[i].kill();
        }
      }

      function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.move();
          p.draw();

          if (p.isKilled) {
            if (p.pos.x < 0 || p.pos.x > canvas.width || p.pos.y < 0 || p.pos.y > canvas.height) {
              particles.splice(i, 1);
            }
          }
        }

        if (mouse.isPressed && mouse.isRightClick) {
          for (const p of particles) {
            const dx = p.pos.x - mouse.x;
            const dy = p.pos.y - mouse.y;
            if (Math.sqrt(dx * dx + dy * dy) < 50) {
              p.kill();
            }
          }
        }

        frameCount++;
        if (frameCount % 240 === 0) {
          wordIndex = (wordIndex + 1) % words.length;
          nextWord(words[wordIndex]);
        }

        requestAnimationFrame(animate);
      }

      canvas.addEventListener('mousedown', (e) => {
        mouse.isPressed = true;
        mouse.isRightClick = e.button === 2;
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });

      canvas.addEventListener('mouseup', () => {
        mouse.isPressed = false;
        mouse.isRightClick = false;
      });

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });

      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
      });

      nextWord(words[0]);
      animate();
    })();
  </script>
</body>
</html>
