<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller Pro — Registro</title>
  <link rel="stylesheet" href="css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/particles.js"></script>
</head>
<body>
  <div class="auth-particles" id="auth-particles"></div>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Taller Pro</h1>
      <p>Crear una cuenta nueva</p>

      <div id="register-form">
        <div class="form-group">
          <label for="full_name">Nombre completo</label>
          <input type="text" id="full_name" placeholder="Juan Pérez" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirmar contraseña</label>
          <input type="password" id="confirm_password" placeholder="Repetí la contraseña" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-block" onclick="register()">
          Crear cuenta
        </button>
      </div>

      <div id="register-message" style="margin-top:1rem; font-size:.85rem;"></div>

      <hr style="margin:1.5rem 0; border-color:var(--border)">
      <p style="font-size:.8rem; color:var(--text-muted)">
        ¿Ya tenés cuenta? <a href="login.html" style="color:var(--primary)">Iniciá sesión</a>
      </p>
    </div>
  </div>

  <script>
    async function register() {
      const fullName = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const msg = document.getElementById('register-message');

      msg.innerHTML = '';

      if (!fullName) {
        msg.innerHTML = '<span style="color:var(--danger)">Ingresá tu nombre completo</span>';
        return;
      }
      if (!email) {
        msg.innerHTML = '<span style="color:var(--danger)">Ingresá tu email</span>';
        return;
      }
      if (!password) {
        msg.innerHTML = '<span style="color:var(--danger)">Ingresá una contraseña</span>';
        return;
      }
      if (password.length < 6) {
        msg.innerHTML = '<span style="color:var(--danger)">La contraseña debe tener al menos 6 caracteres</span>';
        return;
      }
      if (password !== confirmPassword) {
        msg.innerHTML = '<span style="color:var(--danger)">Las contraseñas no coinciden</span>';
        return;
      }

      const btn = document.querySelector('#register-form button');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const { data, error } = await db.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: fullName },
          emailRedirectTo: window.location.origin + '/dashboard.html'
        }
      });

      btn.disabled = false;
      btn.textContent = 'Crear cuenta';

      if (error) {
        msg.innerHTML = `<span style="color:var(--danger)">Error: ${error.message}</span>`;
      } else if (data.user && data.session) {
        window.location.href = 'dashboard.html';
      } else {
        msg.innerHTML = '<span style="color:var(--success)">Revisá tu email para confirmar la cuenta.</span>';
      }
    }

    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    initParticles('auth-particles', ['Taller', 'Pro']);
    initScreensaver(TALLER_CONFIG.name, TALLER_CONFIG.screensaverMinutes);
  </script>
</body>
</html>
