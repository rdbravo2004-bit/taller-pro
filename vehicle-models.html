<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller Pro — Modelos</title>
  <link rel="stylesheet" href="css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div class="page-header">
        <h2>🚗 Modelos de Vehículos</h2>
        <button class="btn btn-primary" id="btn-new-model" style="display:none" onclick="openModelModal()">+ Nuevo Modelo</button>
      </div>

      <div class="filters-bar">
        <input type="text" id="filter-search" placeholder="Buscar por marca o modelo..." oninput="loadModels()">
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Año desde</th>
                <th>Año hasta</th>
                <th id="th-actions" style="display:none">Acciones</th>
              </tr>
            </thead>
            <tbody id="models-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="model-modal">
    <div class="modal">
      <h3 id="modal-title">Nuevo Modelo</h3>
      <form id="model-form" onsubmit="saveModel(event)">
        <input type="hidden" id="model-id">
        <div class="form-row">
          <div class="form-group">
            <label for="model-brand">Marca *</label>
            <input type="text" id="model-brand" required placeholder="Ej: Ford">
          </div>
          <div class="form-group">
            <label for="model-model">Modelo *</label>
            <input type="text" id="model-model" required placeholder="Ej: Focus">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="model-year-min">Año desde</label>
            <input type="number" id="model-year-min" min="1950" max="2030" placeholder="Ej: 2010">
          </div>
          <div class="form-group">
            <label for="model-year-max">Año hasta</label>
            <input type="number" id="model-year-max" min="1950" max="2030" placeholder="Ej: 2025">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" onclick="closeModal('model-modal')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    let isAdminUser = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAuth();
      if (!session) return;
      isAdminUser = await isAdmin();
      if (isAdminUser) {
        document.getElementById('btn-new-model').style.display = '';
        document.getElementById('th-actions').style.display = '';
      }
      loadModels();
    });

    async function loadModels() {
      const search = document.getElementById('filter-search').value.trim().toLowerCase();
      let query = db.from('vehicle_models').select('*').order('brand').order('model');

      if (search) {
        query = query.or(`brand.ilike.%${search}%,model.ilike.%${search}%`);
      }

      const { data, error } = await query;
      const tbody = document.getElementById('models-table');
      if (error) {
        tbody.innerHTML = `<tr><td colspan="5" style="color:var(--danger)">Error: ${error.message}</td></tr>`;
        return;
      }
      tbody.innerHTML = (data || []).map(m => `
        <tr>
          <td><strong>${escapeHTML(m.brand)}</strong></td>
          <td>${escapeHTML(m.model)}</td>
          <td>${m.year_min || '—'}</td>
          <td>${m.year_max || '—'}</td>
          ${isAdminUser ? `<td>
            <button class="btn btn-sm" onclick="editModel('${m.id}')">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteModel('${m.id}', '${escapeHTML(m.brand + ' ' + m.model)}')">🗑</button>
          </td>` : ''}
        </tr>
      `).join('');
    }

    function openModelModal(model = null) {
      document.getElementById('modal-title').textContent = model ? 'Editar Modelo' : 'Nuevo Modelo';
      document.getElementById('model-id').value = model?.id || '';
      document.getElementById('model-brand').value = model?.brand || '';
      document.getElementById('model-model').value = model?.model || '';
      document.getElementById('model-year-min').value = model?.year_min || '';
      document.getElementById('model-year-max').value = model?.year_max || '';
      document.getElementById('model-modal').classList.add('active');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function saveModel(event) {
      event.preventDefault();
      const id = document.getElementById('model-id').value;
      const payload = {
        brand: document.getElementById('model-brand').value.trim(),
        model: document.getElementById('model-model').value.trim(),
        year_min: document.getElementById('model-year-min').value ? parseInt(document.getElementById('model-year-min').value) : null,
        year_max: document.getElementById('model-year-max').value ? parseInt(document.getElementById('model-year-max').value) : null,
      };

      let error;
      if (id) {
        ({ error } = await db.from('vehicle_models').update(payload).eq('id', id));
      } else {
        ({ error } = await db.from('vehicle_models').upsert(payload, { onConflict: 'brand, model, year_min, year_max' }));
      }

      if (error) { toast(error.message, 'error'); return; }
      toast(id ? 'Modelo actualizado' : 'Modelo creado');
      closeModal('model-modal');
      loadModels();
    }

    function editModel(id) {
      db.from('vehicle_models').select('*').eq('id', id).single().then(({ data }) => {
        if (data) openModelModal(data);
      });
    }

    async function deleteModel(id, desc) {
      if (!confirm(`¿Eliminar modelo "${desc}"?`)) return;
      const { error } = await db.from('vehicle_models').delete().eq('id', id);
      if (error) { toast(error.message, 'error'); return; }
      toast('Modelo eliminado');
      loadModels();
    }

    initScreensaver(TALLER_CONFIG.name, TALLER_CONFIG.screensaverMinutes);
  </script>
</body>
</html>
